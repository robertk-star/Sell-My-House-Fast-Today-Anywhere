<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Leads</title><meta name="robots" content="noindex,nofollow"><link rel="stylesheet" href="/assets/styles.css"><script defer src="/assets/admin.js"></script></head><body><main class="admin-wrap"><div class="container"><div class="admin-card" style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:center"><div><h1 style="color:var(--navy);font-size:38px;margin:0">Seller Leads</h1><p class="small">View, search, and update incoming property leads.</p></div><button class="btn btn-light" id="logout-btn">Log Out</button></div><div class="form-grid" style="margin-top:18px"><div class="field"><label>Search</label><input id="search" placeholder="Name, phone, email, address, city"></div><div class="field"><label>Status</label><select id="status"><option value="all">All</option><option value="new">new</option><option value="contacted">contacted</option><option value="appointment_scheduled">appointment_scheduled</option><option value="offer_made">offer_made</option><option value="under_contract">under_contract</option><option value="closed">closed</option><option value="not_a_fit">not_a_fit</option><option value="dead_lead">dead_lead</option></select></div></div><button class="btn btn-primary" id="filter-btn">Apply Filters</button></div><div class="admin-card table-wrap"><div id="lead-result"></div><table><thead><tr><th>Date</th><th>Seller</th><th>Property</th><th>Details</th><th>Status</th><th>Admin Notes</th><th>Action</th></tr></thead><tbody id="lead-rows"></tbody></table></div></div></main></body></html>
