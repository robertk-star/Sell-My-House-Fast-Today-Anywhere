<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Login</title><meta name="robots" content="noindex,nofollow"><link rel="stylesheet" href="/assets/styles.css"></head><body><main class="admin-wrap"><div class="container" style="max-width:520px"><div class="admin-card"><h1 style="color:var(--navy)">Admin Login</h1><p class="muted">Enter your admin password to view seller leads.</p><form id="login-form"><div class="field"><label>Password</label><input type="password" name="password" required autofocus></div><div id="login-result"></div><button class="btn btn-primary" type="submit" style="width:100%">Log In</button></form><p class="small"><a href="/">← Back to site</a></p></div></div></main><script>
document.getElementById('login-form').addEventListener('submit', async (event) => { event.preventDefault(); const result = document.getElementById('login-result'); result.innerHTML = ''; const data = Object.fromEntries(new FormData(event.currentTarget).entries()); const response = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) }); const payload = await response.json().catch(() => ({})); if (response.ok) window.location.href = '/admin/leads'; else result.innerHTML = `<div class="error">${payload.error || 'Unable to log in.'}</div>`; });
</script></body></html>
